<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 620" role="img" aria-labelledby="title desc">
  <title id="title">Tablero detectivesco del Caso Mafe</title>
  <desc id="desc">Tablero con notas, hilos rojos, expediente y pistas sobre María Fernanda Leal Pulido.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#2b2420" flood-opacity="0.22"/>
    </filter>
    <pattern id="grain" width="28" height="28" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="28" height="28" fill="#5b3f32"/>
      <rect width="14" height="28" fill="#644536" opacity="0.52"/>
    </pattern>
  </defs>
  <rect x="62" y="52" width="636" height="500" rx="42" fill="#634537" filter="url(#shadow)"/>
  <rect x="78" y="70" width="604" height="464" rx="30" fill="url(#grain)" opacity=".72"/>
  <path d="M214 215 L374 300 L255 402" fill="none" stroke="#d94b42" stroke-width="6" opacity=".85"/>
  <path d="M374 300 L588 250" fill="none" stroke="#d94b42" stroke-width="6" opacity=".85"/>
  <circle cx="214" cy="215" r="14" fill="#e34c42"/>
  <circle cx="255" cy="402" r="14" fill="#e34c42"/>
  <circle cx="588" cy="250" r="14" fill="#e34c42"/>

  <g transform="translate(110 78) rotate(-8)">
    <rect width="96" height="106" fill="#fff0b7"/>
    <text x="48" y="62" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#251c18">24</text>
  </g>
  <g transform="translate(570 165) rotate(7)">
    <rect width="94" height="106" fill="#fff0b7"/>
    <text x="47" y="62" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#251c18">06</text>
  </g>
  <g transform="translate(130 420) rotate(5)">
    <rect width="118" height="94" fill="#fff0b7"/>
    <text x="59" y="57" text-anchor="middle" font-family="Georgia, serif" font-size="31" fill="#251c18">1967</text>
  </g>

  <g transform="translate(338 286) rotate(-5)">
    <rect x="0" y="0" width="310" height="340" fill="#fef9ef" opacity=".96"/>
    <rect x="26" y="24" width="258" height="230" fill="#f3e3d0" stroke="#dcc6b2" stroke-width="2"/>
    <circle cx="155" cy="112" r="48" fill="#a75d52" opacity=".82"/>
    <text x="155" y="127" text-anchor="middle" font-family="Georgia, serif" font-size="45" fill="#fffaf3">MF</text>
    <text x="155" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#6d5c53">María Fernanda</text>
    <text x="155" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7d6e65">Leal Pulido</text>
  </g>

  <g transform="translate(302 102) rotate(2)">
    <rect width="205" height="112" rx="12" fill="#fffaf3" opacity=".93"/>
    <text x="24" y="42" font-family="Georgia, serif" font-size="24" fill="#54392d">Caso abierto</text>
    <text x="24" y="76" font-family="Arial, sans-serif" font-size="17" fill="#75695f">última página</text>
  </g>
</svg>
